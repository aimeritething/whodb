replicaCount: 1

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

session:
  ttl: 24h
  bootstrapEnabled: true

secret:
  create: true
  existingSecret: ''

metadata:
  dsn: ''
  sessionDsn: ''

  native:
    enabled: true
    clusterName: ''
    replicas: 1
    storage: 3Gi
    resources:
      limits:
        cpu: 1000m
        memory: 1024Mi
      requests:
        cpu: 10m
        memory: 50Mi

extraEnvs: []

ingress:
  enabled: true
  className: nginx
  hostPrefix: dataflow
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'

app:
  enabled: true
  name: dataflow
  displayName: DataFlow
  description: Sealos-native database workspace
  iconPath: /favicon.ico

resources: {}

startupProbe:
  periodSeconds: 5
  failureThreshold: 24
  timeoutSeconds: 3

livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}

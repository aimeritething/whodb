name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERFILE: core/Dockerfile
  GHCR_IMAGE: ghcr.io/${{ github.repository }}/dataflow

jobs:
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      is_release: ${{ steps.meta.outputs.is_release }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          set -euo pipefail
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
            IS_RELEASE="true"
            TAGS="${GHCR_IMAGE}:${VERSION}"$'\n'"${GHCR_IMAGE}:${VERSION}-${SHORT_SHA}"$'\n'"${GHCR_IMAGE}:latest"
          else
            VERSION="main-${SHORT_SHA}"
            IS_RELEASE="false"
            TAGS="${GHCR_IMAGE}:main"$'\n'"${GHCR_IMAGE}:${VERSION}"
          fi

          echo "is_release=${IS_RELEASE}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          {
            echo "tags<<EOF"
            printf '%s\n' "${TAGS}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            PLATFORM=ghcr
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            runnumber=${{ github.run_id }}
          cache-from: type=gha,scope=dataflow-docker
          cache-to: type=gha,mode=max,scope=dataflow-docker

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    if: ${{ needs.docker.outputs.is_release == 'true' }}
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.docker.outputs.version }}
          name: ${{ needs.docker.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            Docker images:
            - `${{ env.GHCR_IMAGE }}:${{ needs.docker.outputs.version }}`
            - `${{ env.GHCR_IMAGE }}:${{ needs.docker.outputs.version }}-${{ needs.docker.outputs.short_sha }}`
            - `${{ env.GHCR_IMAGE }}:latest`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

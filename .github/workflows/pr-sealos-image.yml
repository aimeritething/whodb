name: Build PR Sealos Image Artifact

permissions:
  contents: read

concurrency:
  group: pr-sealos-${{ github.event.pull_request.number }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

env:
  DOCKERFILE: core/Dockerfile
  LOCAL_RUNTIME_IMAGE: dataflow-pr-runtime
  LOCAL_SEALOS_IMAGE: dataflow-cluster-pr
  LOCAL_REGISTRY: 127.0.0.1:5000/dataflow-pr

jobs:
  sealos:
    name: Build PR Sealos Image Tar
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: meta
        run: |
          set -euo pipefail
          SHORT_SHA="$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)"
          PR_IMAGE_TAG="pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
          echo "short_sha=${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "pr_tag=${PR_IMAGE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Build runtime image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: false
          load: true
          platforms: linux/amd64
          tags: ${{ env.LOCAL_RUNTIME_IMAGE }}:${{ steps.meta.outputs.pr_tag }}
          build-args: |
            VERSION=${{ steps.meta.outputs.pr_tag }}
            TARGETARCH=amd64
            PLATFORM=pr
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.pull_request.head.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.pr_tag }}
            org.opencontainers.image.architecture=amd64
            runnumber=${{ github.run_id }}
          cache-from: type=gha,scope=dataflow-pr-runtime-amd64
          cache-to: type=gha,mode=max,scope=dataflow-pr-runtime-amd64

      - name: Start temporary local registry
        run: |
          set -euo pipefail
          docker rm -f dataflow-pr-registry >/dev/null 2>&1 || true
          docker run -d -p 5000:5000 --name dataflow-pr-registry registry:2

      - name: Push runtime image to temporary local registry
        run: |
          set -euo pipefail
          RUNTIME_TAG="${{ steps.meta.outputs.pr_tag }}"
          REGISTRY_IMAGE="${LOCAL_REGISTRY}/runtime:${RUNTIME_TAG}"
          docker tag "${LOCAL_RUNTIME_IMAGE}:${RUNTIME_TAG}" "${REGISTRY_IMAGE}"
          docker push "${REGISTRY_IMAGE}"

      - name: Install cache images tools
        run: sudo bash ./.github/scripts/install.sh

      - name: Cache images for sealos
        working-directory: deploy
        run: |
          set -euo pipefail
          RUNTIME_TAG="${{ steps.meta.outputs.pr_tag }}"
          sed -i "/^image:/,/^[^[:space:]]/ s#^\([[:space:]]*repository:[[:space:]]*\).*#\1${LOCAL_REGISTRY}/runtime#" charts/dataflow/values.yaml
          sed -i "/^image:/,/^[^[:space:]]/ s#^\([[:space:]]*tag:[[:space:]]*\).*#\1${RUNTIME_TAG}#" charts/dataflow/values.yaml
          sudo sealos registry save --registry-dir=registry_amd64 --arch amd64 .
          cp -R registry_amd64 registry_arm64

      - name: Build sealos image (local)
        uses: docker/build-push-action@v6
        with:
          context: ./deploy
          file: ./deploy/Kubefile
          push: false
          load: true
          platforms: linux/amd64
          tags: ${{ env.LOCAL_SEALOS_IMAGE }}:${{ steps.meta.outputs.pr_tag }}-amd64
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.pull_request.head.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.pr_tag }}
            org.opencontainers.image.architecture=amd64
            runnumber=${{ github.run_id }}
          cache-from: type=gha,scope=dataflow-pr-sealos-amd64
          cache-to: type=gha,mode=max,scope=dataflow-pr-sealos-amd64

      - name: Save sealos image tar
        run: |
          set -euo pipefail
          mkdir -p artifacts
          TAR_NAME="dataflow-cluster-pr-${{ github.event.pull_request.number }}-${{ steps.meta.outputs.short_sha }}-amd64.tar"
          docker save "${LOCAL_SEALOS_IMAGE}:${{ steps.meta.outputs.pr_tag }}-amd64" -o "artifacts/${TAR_NAME}"
          gzip -f "artifacts/${TAR_NAME}"

      - name: Upload sealos image tar
        uses: actions/upload-artifact@v4
        with:
          name: dataflow-cluster-pr-${{ github.event.pull_request.number }}-${{ steps.meta.outputs.short_sha }}-amd64
          path: artifacts/*.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Cleanup temporary local registry
        if: always()
        run: docker rm -f dataflow-pr-registry >/dev/null 2>&1 || true
